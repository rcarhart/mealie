services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    ports:
      - "${MEALIE_PORT}:9000"
    environment:
      TZ: ${TZ}
      ALLOW_SIGNUP: "false"
      BASE_URL: ${MEALIE_BASE_URL}
      PUID: ${PUID}
      PGID: ${PGID}
      MAX_WORKERS: "1"
      WEB_CONCURRENCY: "1"
    volumes:
      - ./data:/app/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mealie-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - mealie

mealie-backup:
  image: alpine:3.20
  container_name: mealie-backup
  restart: unless-stopped
  depends_on:
    - mealie
  volumes:
    - ./data:/source
    - ./backups:/backups
    - ./scripts:/scripts
  command: >
    sh -c "
    apk add --no-cache sqlite &&
    chmod +x /scripts/backup-mealie.sh &&
    echo '0 3 * * * /scripts/backup-mealie.sh' > /etc/crontabs/root &&
    crond -f
    "