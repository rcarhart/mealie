title: Honey Do Grocy
views:
  - title: Grocy Honey Do
    path: honey-do-grocy
    icon: mdi:clipboard-check-outline
    theme: Skylight Sand
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "hero hero hero hero hero hero hero hero hero hero hero hero"
        "metrics metrics metrics metrics setup setup setup setup status status status status"
        "chores chores chores chores chores chores projects projects projects projects projects projects"
      grid-template-rows: min-content minmax(180px, auto) minmax(360px, auto)
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "hero"
            "metrics"
            "setup"
            "status"
            "chores"
            "projects"

    cards:
      - type: custom:mushroom-template-card
        view_layout:
          grid-area: hero
        primary: Honey Do Grocy
        secondary: >
          {{ states('sensor.honey_do_grocy_projects_open') }} projects,
          {{ states('sensor.honey_do_grocy_chores_open') }} chores,
          {{ states('sensor.honey_do_grocy_due_today') }} due today.
        icon: mdi:clipboard-check-outline
        icon_color: brown
        multiline_secondary: true
        fill_container: true
        card_mod:
          style: |
            ha-card {
              padding: 22px 24px;
              border-radius: 32px;
              background: linear-gradient(160deg, rgba(245, 235, 224, 0.94), rgba(227, 213, 202, 0.78));
              border: 1px solid rgba(124, 108, 97, 0.10);
              box-shadow: 0 18px 40px rgba(125, 107, 93, 0.12);
            }

      - type: grid
        view_layout:
          grid-area: metrics
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Projects
            secondary: >
              {{ states('sensor.honey_do_grocy_projects_open') }} open
            icon: mdi:hammer-wrench
            icon_color: brown
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Overdue Projects
            secondary: >
              {{ states('sensor.honey_do_grocy_projects_overdue') }} overdue
            icon: mdi:calendar-alert
            icon_color: pink
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Recurring Chores
            secondary: >
              {{ states('sensor.honey_do_grocy_chores_open') }} tracked
            icon: mdi:refresh-circle
            icon_color: teal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Unassigned Chores
            secondary: >
              {{ states('sensor.honey_do_grocy_unassigned_chores') }} ready to claim
            icon: mdi:account-switch-outline
            icon_color: blue
            fill_container: true

      - type: markdown
        view_layout:
          grid-area: setup
        content: |
          ## Grocy Setup

          The integration files are now installed locally in `custom_components/grocy`.

          Do this in Home Assistant:
          1. Restart Home Assistant.
          2. Add the `Grocy` integration in Settings > Devices & Services.
          3. Use URL `http://192.168.86.47`
          4. Use port `9192`
          5. Paste your Grocy API key
          6. Enable these entities:
             - `sensor.grocy_tasks`
             - `sensor.grocy_chores`
             - `binary_sensor.grocy_overdue_tasks`
             - `binary_sensor.grocy_overdue_chores`

          I could not reach the Grocy server from this environment, so I was not able to seed the live tasks and chores for you yet.
        card_mod:
          style: |
            ha-card {
              padding: 20px 22px;
              border-radius: 28px;
              background: rgba(245, 235, 224, 0.80);
            }

      - type: entities
        view_layout:
          grid-area: status
        title: Grocy Entity Status
        show_header_toggle: false
        entities:
          - entity: sensor.grocy_tasks
            name: Task feed
          - entity: sensor.grocy_chores
            name: Chore feed
          - entity: binary_sensor.grocy_overdue_tasks
            name: Overdue projects
          - entity: binary_sensor.grocy_overdue_chores
            name: Overdue chores
        state_color: true
        card_mod:
          style: |
            ha-card {
              border-radius: 28px;
              background: rgba(245, 235, 224, 0.80);
            }

      - type: markdown
        view_layout:
          grid-area: chores
        content: >
          {% set chores = state_attr('sensor.grocy_chores', 'chores') | default([], true) %}
          ## Recurring Chores

          {% if chores | count == 0 %}
          No Grocy chores are visible yet. Once the integration is connected and entities are enabled, your recurring chores will appear here.
          {% else %}
          <table>
            <thead>
              <tr>
                <th align="left">Chore</th>
                <th align="left">Next Due</th>
                <th align="left">Assignee</th>
              </tr>
            </thead>
            <tbody>
            {% for chore in chores | sort(attribute='next_estimated_execution_time') %}
              <tr>
                <td>{{ chore.name | default('Unnamed chore') }}</td>
                <td>
                  {% if chore.next_estimated_execution_time is defined and chore.next_estimated_execution_time %}
                    {{ chore.next_estimated_execution_time[:10] }}
                  {% else %}
                    Unscheduled
                  {% endif %}
                </td>
                <td>
                  {% if chore.user_id is defined and chore.user_id %}
                    User {{ chore.user_id }}
                  {% else %}
                    Unassigned
                  {% endif %}
                </td>
              </tr>
            {% endfor %}
            </tbody>
          </table>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              padding: 20px 22px;
              border-radius: 28px;
              background: rgba(245, 235, 224, 0.82);
            }
            table {
              width: 100%;
              border-collapse: collapse;
            }
            th, td {
              padding: 10px 8px;
              border-bottom: 1px solid rgba(124, 108, 97, 0.12);
            }

      - type: markdown
        view_layout:
          grid-area: projects
        content: >
          {% set tasks = state_attr('sensor.grocy_tasks', 'tasks') | default([], true) %}
          ## Projects

          {% if tasks | count == 0 %}
          No Grocy projects are visible yet. Once your task entities are enabled, your dated honey-do projects will appear here.
          {% else %}
          <table>
            <thead>
              <tr>
                <th align="left">Project</th>
                <th align="left">Due</th>
                <th align="left">Category</th>
              </tr>
            </thead>
            <tbody>
            {% for task in tasks | sort(attribute='due_date') %}
              <tr>
                <td>{{ task.name | default('Unnamed task') }}</td>
                <td>
                  {% if task.due_date is defined and task.due_date %}
                    {{ task.due_date }}
                  {% else %}
                    No due date
                  {% endif %}
                </td>
                <td>
                  {% if task.category_id is defined and task.category_id %}
                    Category {{ task.category_id }}
                  {% else %}
                    General
                  {% endif %}
                </td>
              </tr>
            {% endfor %}
            </tbody>
          </table>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              padding: 20px 22px;
              border-radius: 28px;
              background: rgba(245, 235, 224, 0.82);
            }
            table {
              width: 100%;
              border-collapse: collapse;
            }
            th, td {
              padding: 10px 8px;
              border-bottom: 1px solid rgba(124, 108, 97, 0.12);
            }
