                  padding: 18px 20px;
                  border-radius: 28px;
                  background: rgba(245, 235, 224, 0.70);
                }
          - type: grid
            columns: 2
            square: false
            cards:
              - type: conditional
                conditions: [{ entity: input_boolean.grocy_done_walk_the_dog, state: "on" }]
                card: { type: custom:mushroom-template-card, primary: Walk the Dog, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
              - type: conditional
                conditions: [{ entity: input_boolean.grocy_done_vacuum, state: "on" }]
                card: { type: custom:mushroom-template-card, primary: Vacuum, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
              - type: conditional
                conditions: [{ entity: input_boolean.grocy_done_clean_upstairs_bathroom, state: "on" }]
                card: { type: custom:mushroom-template-card, primary: Clean Upstairs Bathroom, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
