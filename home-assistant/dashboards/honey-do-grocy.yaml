title: Honey Do Grocy
views:
  - title: Chores
    path: honey-do-grocy
    icon: mdi:clipboard-check-outline
    theme: Skylight Sand
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "hero hero hero hero hero hero hero hero hero hero hero hero"
        "metrics metrics metrics metrics metrics metrics metrics metrics metrics metrics metrics metrics"
        "ross ross ross ross ross ross kelly kelly kelly kelly kelly kelly"
        "done done done done done done done done done done done done"
      grid-template-rows: min-content min-content minmax(520px, auto) minmax(220px, auto)
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "hero"
            "metrics"
            "ross"
            "kelly"
            "done"

    cards:
      - type: custom:mushroom-template-card
        view_layout:
          grid-area: hero
        primary: Family Chores
        secondary: >
          {{ states('sensor.honey_do_grocy_chores_open') }} chores left,
          {{ states('sensor.honey_do_grocy_unassigned_chores') }} unclaimed,
          {{ states('sensor.honey_do_grocy_due_today') }} due today.
        icon: mdi:home-heart
        icon_color: brown
        multiline_secondary: true
        fill_container: true
        card_mod:
          style: |
            ha-card {
              padding: 24px 26px;
              border-radius: 32px;
              background: linear-gradient(160deg, rgba(245, 235, 224, 0.94), rgba(227, 213, 202, 0.78));
              border: 1px solid rgba(124, 108, 97, 0.10);
              box-shadow: 0 18px 40px rgba(125, 107, 93, 0.12);
            }

      - type: grid
        view_layout:
          grid-area: metrics
        columns: 4
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Active
            secondary: "{{ states('sensor.honey_do_grocy_chores_open') }}"
            icon: mdi:refresh-circle
            icon_color: teal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Completed
            secondary: "{{ states('sensor.honey_do_grocy_chores_completed') }}"
            icon: mdi:check-circle
            icon_color: green
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Unclaimed
            secondary: "{{ states('sensor.honey_do_grocy_unassigned_chores') }}"
            icon: mdi:account-switch-outline
            icon_color: blue
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Due Today
            secondary: "{{ states('sensor.honey_do_grocy_due_today') }}"
            icon: mdi:calendar-today
            icon_color: brown
            fill_container: true

      - type: vertical-stack
        view_layout:
          grid-area: ross
        cards:
          - type: markdown
            content: |
              ## Ross
              Claim a chore, then tap its card to complete it.
            card_mod:
              style: |
                ha-card {
                  padding: 18px 20px;
                  border-radius: 28px;
                  background: rgba(213, 189, 175, 0.86);
                }
          - type: conditional
            conditions:
              - entity: input_boolean.grocy_done_walk_the_dog
                state: "off"
            card:
              type: custom:mushroom-template-card
              primary: Walk the Dog
              secondary: "{{ states('input_select.grocy_claim_walk_the_dog') }}"
              icon: mdi:dog-side
              icon_color: teal
              tap_action:
                action: call-service
                service: script.honey_do_grocy_complete_chore
                data:
                  chore_name: Walk the Dog
                  complete_entity: input_boolean.grocy_done_walk_the_dog
              fill_container: true
              card_mod:
                style: |
                  ha-card {
                    background:
                      {% if is_state('input_select.grocy_claim_walk_the_dog', 'Ross') %}
                        rgba(213, 189, 175, 0.96)
                      {% elif is_state('input_select.grocy_claim_walk_the_dog', 'Kelly') %}
                        rgba(227, 213, 202, 0.96)
                      {% else %}
                        rgba(245, 235, 224, 0.82)
                      {% endif %};
                    border-radius: 26px;
                  }
          - type: conditional
            conditions:
              - entity: input_boolean.grocy_done_walk_the_dog
                state: "off"
            card:
              type: entity
              entity: input_select.grocy_claim_walk_the_dog
              name: Walk the Dog owner
          - type: conditional
            conditions:
              - entity: input_boolean.grocy_done_vacuum
                state: "off"
            card:
              type: custom:mushroom-template-card
              primary: Vacuum
              secondary: "{{ states('input_select.grocy_claim_vacuum') }}"
