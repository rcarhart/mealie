title: Honey Do Projects
views:
  - title: Projects
    path: honey-do-projects
    icon: mdi:hammer-wrench
    theme: Skylight Sand
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "hero hero hero hero hero hero hero hero hero hero hero hero"
        "active active active active active active completed completed completed completed completed completed"
      grid-template-rows: min-content minmax(520px, auto)
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "hero"
            "active"
            "completed"

    cards:
      - type: custom:mushroom-template-card
        view_layout:
          grid-area: hero
        primary: Home Projects
        secondary: >
          {{ states('sensor.honey_do_grocy_projects_open') }} open,
          {{ states('sensor.honey_do_grocy_projects_completed') }} completed,
          {{ states('sensor.honey_do_grocy_projects_overdue') }} overdue.
        icon: mdi:hammer-wrench
        icon_color: brown
        multiline_secondary: true
        fill_container: true
        card_mod:
          style: |
            ha-card {
              padding: 24px 26px;
              border-radius: 32px;
              background: linear-gradient(160deg, rgba(245, 235, 224, 0.94), rgba(227, 213, 202, 0.78));
              border: 1px solid rgba(124, 108, 97, 0.10);
            }

      - type: vertical-stack
        view_layout:
          grid-area: active
        cards:
          - type: markdown
            content: |
              ## Active Projects
              Tap a card to complete it in Grocy.
            card_mod:
              style: |
                ha-card {
                  padding: 18px 20px;
                  border-radius: 28px;
                  background: rgba(245, 235, 224, 0.82);
                }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_upstairs_air_condition, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Upstairs Air Condition, secondary: Due 2026-05-01, icon: mdi:air-conditioner, icon_color: blue, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Ross - Upstairs Air Condition, complete_entity: input_boolean.grocy_done_upstairs_air_condition } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(213, 189, 175, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_kitchen_cabinet_painting, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Kitchen Cabinet Painting, secondary: Due 2026-05-01, icon: mdi:brush-variant, icon_color: brown, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Kelly - Kitchen Cabinet Painting, complete_entity: input_boolean.grocy_done_kitchen_cabinet_painting } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(227, 213, 202, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_mailbox_sign, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Mailbox Sign, secondary: Due 2026-06-01, icon: mdi:mailbox-outline, icon_color: brown, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Kelly - Mailbox Sign, complete_entity: input_boolean.grocy_done_mailbox_sign } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(227, 213, 202, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_sell_or_throw_away_wedding_decorations, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Sell or Throw Away Wedding Decorations, secondary: Due 2026-06-01, icon: mdi:party-popper, icon_color: pink, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Kelly - Sell or Throw Away Wedding Decorations, complete_entity: input_boolean.grocy_done_sell_or_throw_away_wedding_decorations } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(227, 213, 202, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_remove_clutter, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Remove Clutter, secondary: Due 2026-06-01, icon: mdi:broom, icon_color: orange, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Kelly - Remove Clutter, complete_entity: input_boolean.grocy_done_remove_clutter } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(227, 213, 202, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_dining_room_cabinet_build, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Dining Room Cabinet Build, secondary: Due 2026-06-15, icon: mdi:hammer-screwdriver, icon_color: blue, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Ross - Dining Room Cabinet Build, complete_entity: input_boolean.grocy_done_dining_room_cabinet_build } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(213, 189, 175, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_kitchen_countertops, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Kitchen Countertops, secondary: Due 2026-07-01, icon: mdi:countertop, icon_color: brown, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Kelly - Kitchen Countertops, complete_entity: input_boolean.grocy_done_kitchen_countertops } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(227, 213, 202, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_basement_sliding_doors, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Basement Sliding Doors, secondary: Due 2026-07-01, icon: mdi:door-sliding, icon_color: blue, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Ross - Basement Sliding Doors, complete_entity: input_boolean.grocy_done_basement_sliding_doors } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(213, 189, 175, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_dining_room_cabinet_organization, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Dining Room Cabinet Organization, secondary: Due 2026-07-01, icon: mdi:bookshelf, icon_color: teal, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Kelly - Dining Room Cabinet Organization, complete_entity: input_boolean.grocy_done_dining_room_cabinet_organization } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(227, 213, 202, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_bathtub_caulking, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Bathtub Caulking, secondary: Due 2026-08-01, icon: mdi:bathtub-outline, icon_color: blue, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Ross - Bathtub Caulking, complete_entity: input_boolean.grocy_done_bathtub_caulking } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(213, 189, 175, 0.92); border-radius: 26px; }" } }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_recessed_lights, state: "off" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Recessed Lights, secondary: Due 2026-10-01, icon: mdi:light-recessed, icon_color: amber, tap_action: { action: call-service, service: script.honey_do_grocy_complete_task, data: { task_name: Ross - Recessed Lights, complete_entity: input_boolean.grocy_done_recessed_lights } }, fill_container: true, card_mod: { style: "ha-card { background: rgba(213, 189, 175, 0.92); border-radius: 26px; }" } }

      - type: vertical-stack
        view_layout:
          grid-area: completed
        cards:
          - type: markdown
            content: |
              ## Completed Projects
            card_mod:
              style: |
                ha-card {
                  padding: 18px 20px;
                  border-radius: 28px;
                  background: rgba(245, 235, 224, 0.70);
                }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_upstairs_air_condition, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Upstairs Air Condition, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_kitchen_cabinet_painting, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Kitchen Cabinet Painting, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_mailbox_sign, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Mailbox Sign, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_sell_or_throw_away_wedding_decorations, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Sell or Throw Away Wedding Decorations, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_remove_clutter, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Remove Clutter, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_dining_room_cabinet_build, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Dining Room Cabinet Build, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_kitchen_countertops, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Kitchen Countertops, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_basement_sliding_doors, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Basement Sliding Doors, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_dining_room_cabinet_organization, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Kelly - Dining Room Cabinet Organization, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_bathtub_caulking, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Bathtub Caulking, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
          - type: conditional
            conditions: [{ entity: input_boolean.grocy_done_recessed_lights, state: "on" }]
            card: { type: custom:mushroom-template-card, primary: Ross - Recessed Lights, secondary: Complete, icon: mdi:check-circle, icon_color: green, fill_container: true }
