views:
  - title: Kitchen
    path: kitchen
    icon: mdi:chef-hat
    theme: Kitchen Dark
    badges: []

    cards:

      - type: grid
        columns: 4
        square: false
        cards:

          - type: tile
            entity: sensor.kitchen_time
            name: Time
            vertical: true
            tap_action:
              action: none

          - type: tile
            entity: weather.home
            name: Weather
            vertical: true

          - type: tile
            entity: calendar.family
            name: Today
            vertical: true

          - type: tile
            entity: sensor.house_status
            name: House
            vertical: true


      - type: grid
        columns: 2
        square: false
        cards:

          - type: picture
            image: >
              https://recipes.rosscarhart.com/api/media/recipes/{{states('sensor.mealie_todays_meal_id')}}/images/min-original.webp
            tap_action:
              action: url
              url_path: https://recipes.rosscarhart.com
            title: >
              Dinner Tonight: {{states('sensor.mealie_todays_meal')}}

          - type: tile
            entity: todo.grocery_list
            name: Groceries
            icon: mdi:cart-outline


      - type: grid
        columns: 2
        square: false
        cards:

          - type: tile
            entity: todo.chores
            name: Chores
            icon: mdi:broom

          - type: tile
            entity: climate.kitchen
            name: Home
            icon: mdi:home-thermometer-outline


      - type: picture-entity
        entity: camera.nest_doorbell
        name: Front Door
        camera_view: live