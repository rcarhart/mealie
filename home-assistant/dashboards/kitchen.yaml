# Live kitchen dashboard.
# Home Assistant is currently configured to load this file.
# Layout overview:
# - Weekly: current week's meal plan
# - Meal: featured dinner card
# - Shopping: Mealie to-do list
# - Media: kitchen speaker controls
# - Recipe subview: ingredients and directions for tonight's meal
views:
  - title: Kitchen
    path: kitchen
    icon: mdi:chef-hat
    theme: Kitchen Dark
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "weekly weekly weekly weekly weekly weekly weekly weekly weekly weekly weekly weekly"
        "meal meal meal meal meal meal shopping shopping shopping shopping shopping shopping"
        "meal meal meal meal meal meal media media media media media media"
      grid-template-rows: min-content min-content minmax(150px, auto) min-content
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "weekly"
            "meal"
            "shopping"
            "media"

    cards:
      # Featured dinner card:
      # Uses the Mealie recipe image camera entity and opens the recipe subview.
      - type: vertical-stack
        view_layout:
          grid-area: meal
        cards:
          - type: markdown
            title: Tonight
            content: >
              ## {{ states('sensor.mealie_todays_meal') }}

              Tap the image below to view ingredients and directions.
          - type: picture-entity
            entity: camera.recipes_rosscarhart_com
            name: Tonight's Recipe
            show_state: false
            tap_action:
              action: navigate
              navigation_path: /kitchen-dashboard/kitchen-recipe

      # Shopping section:
      # Header card plus the official Mealie to-do list entity for bi-directional sync.
      - type: vertical-stack
        view_layout:
          grid-area: shopping
        cards:
          - type: custom:mushroom-template-card
            primary: Shopping List
            secondary: >
              Tap items to complete them or add new ones at the bottom.
            icon: mdi:cart-outline
            icon_color: cyan
            multiline_secondary: true
            fill_container: true

          - type: todo-list
            entity: todo.mealie_groceries
            title: ''
            hide_completed: false

      # Weekly meal plan:
      # Horizontal strip showing only meals from the current Sunday-Saturday week.
      - type: markdown
        view_layout:
          grid-area: weekly
        title: Weekly Meal Plan
        content: >
          {% set meals = state_attr('sensor.mealie_weekly_plan', 'items') or [] %}
          {% if meals %}
          {% for item in meals %}
          - **{{ as_datetime(item.date).strftime('%A') if item.date else 'Planned' }}:** {{ item.recipe.name if item.recipe is defined and item.recipe and item.recipe.name is defined else item.title if item.title is defined else 'Meal planned' }}
          {% endfor %}
          {% else %}
          Weekly plan is loading from Mealie.
          {% endif %}

      # Media section:
      # Spotify section:
      # Simple now-playing card for the kitchen view.
      - type: media-control
        view_layout:
          grid-area: media
        entity: media_player.spotify_rcarhart2
        theme: Frosted Glass Dark

  # Recipe subview:
  # Opens from the featured dinner card and keeps kiosk users inside Home Assistant.
  - title: Recipe
    path: kitchen-recipe
    subview: true
    theme: Kitchen Dark
    badges: []
    cards:
      # Recipe header card with title and quick metadata.
      - type: custom:mushroom-template-card
        entity: sensor.mealie_todays_recipe
        primary: >
          {{ states('sensor.mealie_todays_recipe') }}
        secondary: >
          {% set total = state_attr('sensor.mealie_todays_recipe', 'totalTime') %}
          {% set category = state_attr('sensor.mealie_todays_recipe', 'recipeCategory') %}
          Tonight's recipe{% if total %} - {{ total }}{% endif %}{% if category %} - {{ category }}{% endif %}
        icon: mdi:book-open-page-variant
        icon_color: amber
        fill_container: true

      # Recipe image banner.
      - type: custom:button-card
        entity: camera.recipes_rosscarhart_com
        aspect_ratio: 16/8
        show_entity_picture: true
        name: Recipe Image
        show_state: false

      # Ingredients card:
      # Prefers Mealie's display/original text fields, then falls back to structured parts.
      - type: markdown
        title: Ingredients
        content: >
          {% set ingredients = state_attr('sensor.mealie_todays_recipe', 'recipeIngredient') or [] %}
          {% if ingredients %}
          {% for item in ingredients %}
          - {{
              item.display
              if item.display is defined and item.display not in [none, '', 'None']
              else item.originalText
              if item.originalText is defined and item.originalText not in [none, '', 'None']
              else item.note
              if item.note is defined and item.note not in [none, '', 'None']
              else (
                ((item.quantity | string) ~ ' ')
                if item.quantity is defined and item.quantity not in [none, '', 'None']
                else ''
              )
              ~ (
                (item.unit.name ~ ' ')
                if item.unit is defined and item.unit and item.unit.name is defined and item.unit.name not in [none, '', 'None']
                else (item.unit ~ ' ')
                if item.unit is defined and item.unit not in [none, '', 'None']
                else ''
              )
              ~ (
                item.food.name
                if item.food is defined and item.food and item.food.name is defined and item.food.name not in [none, '', 'None']
                else item.title
                if item.title is defined and item.title not in [none, '', 'None']
                else 'Ingredient'
              )
              ~ (
                ' - ' ~ item.preparation
                if item.preparation is defined and item.preparation not in [none, '', 'None']
                else ''
              )
            }}
          {% endfor %}
          {% else %}
          Ingredients are loading.
          {% endif %}

      # Directions card:
      # Renders each Mealie instruction step in order.
      - type: markdown
        title: Directions
        content: >
          {% set steps = state_attr('sensor.mealie_todays_recipe', 'recipeInstructions') or [] %}
          {% if steps %}
          {% for step in steps %}
          {% set step_text =
            step.text
            if step is mapping and step.text is defined and step.text not in [none, '', 'None']
            else step.instruction
            if step is mapping and step.instruction is defined and step.instruction not in [none, '', 'None']
            else step.description
            if step is mapping and step.description is defined and step.description not in [none, '', 'None']
            else step.summary
            if step is mapping and step.summary is defined and step.summary not in [none, '', 'None']
            else step.originalText
            if step is mapping and step.originalText is defined and step.originalText not in [none, '', 'None']
            else step.name
            if step is mapping and step.name is defined and step.name not in [none, '', 'None']
            else step
            if step is string
            else '' %}
          **Step {{ loop.index }}**

          {{ step_text }}

          {% endfor %}
          {% else %}
          Directions are loading.
          {% endif %}
