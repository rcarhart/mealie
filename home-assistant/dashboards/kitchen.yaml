views:
  - title: Kitchen
    path: kitchen
    icon: mdi:chef-hat
    theme: Kitchen Dark
    type: custom:grid-layout
    badges: []
    layout:
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "header header header header header header header header header header header header"
        "weekly weekly weekly weekly weekly weekly weekly weekly weekly weekly weekly weekly"
        "meal meal meal meal meal meal meal shopping shopping shopping shopping shopping"
        "meal meal meal meal meal meal meal media media media media media"
      grid-template-rows: min-content min-content minmax(150px, auto) min-content
      grid-gap: 20px
      margin: 20px
      mediaquery:
        "(max-width: 1100px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "header"
            "weekly"
            "meal"
            "shopping"
            "media"

    cards:
      - type: vertical-stack
        view_layout:
          grid-area: header
        cards:
          - type: custom:mushroom-template-card
            primary: Kitchen
            secondary: >
              {% set world = states('sensor.worldclock_sensor') %}
              {{ now().strftime('%A, %B') }} {{ now().day }} - {{ world if world not in ['unknown', 'unavailable', 'None'] else states('sensor.kitchen_time') }}
            icon: mdi:chef-hat
            icon_color: amber
            fill_container: true
            multiline_secondary: false
            card_mod:
              style: |
                ha-card {
                  border-radius: 28px;
                  padding: 14px 18px;
                  background:
                    radial-gradient(circle at top right, rgba(255, 193, 7, 0.16), transparent 28%),
                    linear-gradient(145deg, rgba(28, 28, 30, 0.96), rgba(18, 18, 20, 0.98));
                  border: 1px solid rgba(255, 255, 255, 0.07);
                  box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
                }
                mushroom-shape-icon {
                  --shape-color: rgba(255, 193, 7, 0.18) !important;
                }
                .primary {
                  font-size: 2.2rem !important;
                  font-weight: 700 !important;
                  letter-spacing: -0.04rem;
                }
                .secondary {
                  font-size: 1rem !important;
                  opacity: 0.82;
                }

          - type: custom:mushroom-chips-card
            alignment: justify
            chips:
              - type: template
                entity: sensor.mealie_todays_meal
                icon: mdi:silverware-fork-knife
                icon_color: deep-orange
                content: >
                  {{ states('sensor.mealie_todays_meal') }}
                tap_action:
                  action: none

              - type: template
                entity: sensor.mealie_shopping_items
                icon: mdi:cart-outline
                icon_color: cyan
                content: >
                  {{ states('sensor.mealie_shopping_items') }} items
                tap_action:
                  action: more-info

              - type: template
                entity: media_player.kitchen_speaker
                icon: mdi:music-note
                icon_color: teal
                content: >
                  {% set title = state_attr('media_player.kitchen_speaker', 'media_title') %}
                  {% set spotify_title = state_attr('media_player.spotify_rcarhart2', 'media_title') %}
                  {% if title %}
                    {{ title }}
                  {% elif spotify_title %}
                    {{ spotify_title }}
                  {% elif is_state('media_player.kitchen_speaker', 'playing') %}
                    Playing
                  {% else %}
                    Music idle
                  {% endif %}
                tap_action:
                  action: more-info

              - type: template
                entity: weather.forecast_home
                icon: mdi:weather-partly-cloudy
                icon_color: blue
                content: >
                  {{ state_attr('weather.forecast_home', 'temperature') }}{{ state_attr('weather.forecast_home', 'temperature_unit') if state_attr('weather.forecast_home', 'temperature_unit') else '' }}
                tap_action:
                  action: more-info
            card_mod:
              style: |
                ha-card {
                  margin-top: 10px;
                  padding: 6px;
                  border-radius: 24px;
                  background: rgba(20, 20, 22, 0.78);
                  border: 1px solid rgba(255, 255, 255, 0.06);
                  box-shadow: 0 14px 28px rgba(0, 0, 0, 0.2);
                }

      - type: custom:button-card
        view_layout:
          grid-area: meal
        entity: camera.recipes_rosscarhart_com
        aspect_ratio: 16/7
        show_entity_picture: true
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /kitchen-dashboard/kitchen-recipe
        styles:
          card:
            - padding: 0
            - border-radius: 30px
            - overflow: hidden
            - border: 1px solid rgba(255,255,255,0.08)
            - box-shadow: 0 22px 44px rgba(0,0,0,0.34)
            - background: linear-gradient(145deg, rgba(26,26,28,0.96), rgba(14,14,16,0.98))
            - height: 190px
            - position: relative
          entity_picture:
            - width: 100%
            - height: 100%
            - object-fit: cover
            - filter: saturate(1.02) contrast(1.02)
          custom_fields:
            shade:
              - position: absolute
              - inset: 0
              - background: linear-gradient(to top, rgba(6, 6, 8, 0.88) 12%, rgba(6, 6, 8, 0.2) 45%, rgba(6, 6, 8, 0.04) 72%)
            badge:
              - position: absolute
              - top: 16px
              - left: 16px
              - padding: 6px 10px
              - border-radius: 999px
              - background: rgba(15, 15, 17, 0.58)
              - backdrop-filter: blur(12px)
              - border: 1px solid rgba(255,255,255,0.08)
              - color: rgba(255,255,255,0.92)
              - font-size: 0.72rem
              - font-weight: 600
              - letter-spacing: 0.08rem
              - text-transform: uppercase
            panel:
              - position: absolute
              - left: 18px
              - bottom: 18px
              - width: 60%
              - max-width: 460px
              - padding: 14px 16px
              - border-radius: 20px
              - background: rgba(16, 16, 18, 0.34)
              - backdrop-filter: blur(18px)
              - border: 1px solid rgba(255,255,255,0.09)
              - box-shadow: 0 18px 30px rgba(0,0,0,0.2)
              - text-align: left
        custom_fields:
          shade: ""
          badge: Tonight
          panel: >
            [[[
              const meal = states["sensor.mealie_todays_meal"]?.state || "No meal planned";
              return `
                <div style="font-size: 1.22rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.02rem; color: rgba(255,255,255,0.98); margin-bottom: 6px;">
                  ${meal}
                </div>
                <div style="font-size: 0.82rem; color: rgba(255,255,255,0.76); margin-bottom: 10px;">
                  Tap to view ingredients and directions.
                </div>
                <div style="display: inline-flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.95); font-size: 0.84rem; font-weight: 600;">
                  View recipe
                </div>
              `;
            ]]]

      - type: vertical-stack
        view_layout:
          grid-area: shopping
        cards:
          - type: custom:mushroom-template-card
            primary: Shopping List
            secondary: >
              Tap items to complete them or add new ones at the bottom.
            icon: mdi:cart-outline
            icon_color: cyan
            multiline_secondary: true
            fill_container: true
            card_mod:
              style: |
                ha-card {
                  border-radius: 30px 30px 0 0;
                  padding: 18px 20px 12px;
                  background: linear-gradient(145deg, rgba(28, 28, 30, 0.96), rgba(17, 17, 19, 0.98));
                  border: 1px solid rgba(255, 255, 255, 0.07);
                  border-bottom: none;
                  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
                }
                mushroom-shape-icon {
                  --shape-color: rgba(106, 214, 224, 0.16) !important;
                }
                .primary {
                  font-size: 1.8rem !important;
                  font-weight: 700 !important;
                  letter-spacing: -0.03rem;
                }
                .secondary {
                  font-size: 0.96rem !important;
                  line-height: 1.5 !important;
                  opacity: 0.76;
                }

          - type: todo-list
            entity: todo.mealie_groceries
            title: ''
            hide_completed: false
            card_mod:
              style: |
                ha-card {
                  border-radius: 0 0 30px 30px;
                  padding: 0 10px 14px;
                  background: linear-gradient(145deg, rgba(28, 28, 30, 0.96), rgba(17, 17, 19, 0.98));
                  border: 1px solid rgba(255, 255, 255, 0.07);
                  border-top: none;
                  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
                  min-height: 260px;
                }

      - type: custom:button-card
        view_layout:
          grid-area: weekly
        entity: sensor.mealie_weekly_plan
        show_icon: true
        show_name: true
        show_state: false
        name: Weekly Meal Plan
        icon: mdi:calendar-week
        styles:
          grid:
            - grid-template-areas: '"i n" "body body"'
            - grid-template-columns: min-content 1fr
            - grid-template-rows: min-content 1fr
            - column-gap: 12px
          card:
            - padding: 24px
            - border-radius: 30px
            - background: linear-gradient(145deg, rgba(28,28,30,0.96), rgba(17,17,19,0.98))
            - border: 1px solid rgba(255,255,255,0.07)
            - box-shadow: 0 20px 40px rgba(0,0,0,0.3)
            - min-height: 0
          icon:
            - color: rgba(240, 169, 91, 0.95)
            - width: 30px
          name:
            - justify-self: start
            - align-self: center
            - font-size: 1.8rem
            - font-weight: 700
            - letter-spacing: -0.03rem
          custom_fields:
            body:
              - margin-top: 20px
              - text-align: left
        custom_fields:
          body: >
            [[[
              const meals = entity?.attributes?.items || [];
              if (!meals.length) {
                return `<div style="padding: 24px 0 8px; color: rgba(255,255,255,0.78); font-size: 1rem;">Weekly plan is loading from Mealie.</div>`;
              }

              const today = new Date();
              today.setHours(12, 0, 0, 0);
              const weekStart = new Date(today);
              weekStart.setDate(today.getDate() - today.getDay());
              weekStart.setHours(0, 0, 0, 0);

              const weekEnd = new Date(weekStart);
              weekEnd.setDate(weekStart.getDate() + 6);
              weekEnd.setHours(23, 59, 59, 999);

              const weeklyMeals = meals.filter((item) => {
                if (!item.date) return false;
                const itemDate = new Date(`${item.date}T12:00:00`);
                return itemDate >= weekStart && itemDate <= weekEnd;
              });

              if (!weeklyMeals.length) {
                return `<div style="padding: 24px 0 8px; color: rgba(255,255,255,0.78); font-size: 1rem;">No meals planned for this week yet.</div>`;
              }

              const formatter = new Intl.DateTimeFormat("en-US", { weekday: "long" });
              const rows = weeklyMeals.map((item) => {
                const recipe = item.recipe || {};
                const mealName = recipe.name || item.title || "Meal planned";
                const slug = recipe.slug || "";
                const day = item.date ? formatter.format(new Date(`${item.date}T12:00:00`)) : "Planned";
                const links = slug
                  ? `<div style="margin-top:8px; display:flex; gap:10px; align-items:center; font-size:0.86rem;">
                       <a href="https://recipes.rosscarhart.com/g/home/r/${slug}" style="color:#f0a95b; text-decoration:none;">Recipe</a>
                       <span style="color:rgba(255,255,255,0.28);">/</span>
                       <a href="https://recipes.rosscarhart.com/g/home/r/${slug}/cook" style="color:#f0a95b; text-decoration:none;">Cook</a>
                     </div>`
                  : ``;
                return `
                  <div style="min-width:148px; padding:12px 14px; border-radius:20px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06);">
                    <div style="color:rgba(255,255,255,0.56); font-size:0.78rem; font-weight:700; letter-spacing:0.08rem; text-transform:uppercase; margin-bottom:8px;">
                      ${day}
                    </div>
                    <div style="color:rgba(255,255,255,0.97); font-size:0.92rem; line-height:1.3; font-weight:600;">
                      ${mealName}
                    </div>
                    ${links}
                  </div>
                `;
              }).join("");
              return `<div style="display:flex; gap:12px; overflow-x:auto; padding-bottom:4px;">${rows}</div>`;
            ]]]

      - type: custom:mushroom-media-player-card
        view_layout:
          grid-area: media
        entity: media_player.kitchen_speaker
        name: Kitchen Speaker
        use_media_info: true
        show_volume_level: false
        volume_controls:
          - volume_buttons
          - mute
        media_controls:
          - previous
          - play_pause_stop
          - next
        card_mod:
          style: |
            ha-card {
              border-radius: 28px;
              overflow: hidden;
              background: linear-gradient(145deg, rgba(28, 28, 30, 0.96), rgba(16, 16, 18, 0.98));
              border: 1px solid rgba(255, 255, 255, 0.07);
              box-shadow: 0 18px 36px rgba(0, 0, 0, 0.26);
            }

  - title: Recipe
    path: kitchen-recipe
    subview: true
    theme: Kitchen Dark
    badges: []
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.mealie_todays_recipe
        primary: >
          {{ states('sensor.mealie_todays_recipe') }}
        secondary: >
          {% set total = state_attr('sensor.mealie_todays_recipe', 'totalTime') %}
          {% set category = state_attr('sensor.mealie_todays_recipe', 'recipeCategory') %}
          Tonight's recipe{% if total %} - {{ total }}{% endif %}{% if category %} - {{ category }}{% endif %}
        icon: mdi:book-open-page-variant
        icon_color: amber
        fill_container: true

      - type: custom:button-card
        entity: camera.recipes_rosscarhart_com
        aspect_ratio: 16/8
        show_entity_picture: true
        show_name: false
        show_state: false
        styles:
          card:
            - padding: 0
            - border-radius: 28px
            - overflow: hidden
            - border: 1px solid rgba(255,255,255,0.08)
            - box-shadow: 0 18px 36px rgba(0,0,0,0.28)
            - background: linear-gradient(145deg, rgba(26,26,28,0.96), rgba(14,14,16,0.98))
            - height: 180px
          entity_picture:
            - width: 100%
            - height: 100%
            - object-fit: cover
            - filter: saturate(1.02) contrast(1.02)

      - type: markdown
        title: Ingredients
        content: >
          {% set ingredients = state_attr('sensor.mealie_todays_recipe', 'recipeIngredient') or [] %}
          {% if ingredients %}
          {% for item in ingredients %}
          - {{
              item.display
              if item.display is defined and item.display not in [none, '', 'None']
              else item.originalText
              if item.originalText is defined and item.originalText not in [none, '', 'None']
              else item.note
              if item.note is defined and item.note not in [none, '', 'None']
              else (
                ((item.quantity | string) ~ ' ')
                if item.quantity is defined and item.quantity not in [none, '', 'None']
                else ''
              )
              ~ (
                (item.unit.name ~ ' ')
                if item.unit is defined and item.unit and item.unit.name is defined and item.unit.name not in [none, '', 'None']
                else (item.unit ~ ' ')
                if item.unit is defined and item.unit not in [none, '', 'None']
                else ''
              )
              ~ (
                item.food.name
                if item.food is defined and item.food and item.food.name is defined and item.food.name not in [none, '', 'None']
                else item.title
                if item.title is defined and item.title not in [none, '', 'None']
                else 'Ingredient'
              )
              ~ (
                ' - ' ~ item.preparation
                if item.preparation is defined and item.preparation not in [none, '', 'None']
                else ''
              )
            }}
          {% endfor %}
          {% else %}
          Ingredients are loading.
          {% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 28px;
              padding: 8px 12px 12px;
              background: linear-gradient(145deg, rgba(28, 28, 30, 0.96), rgba(16, 16, 18, 0.98));
              border: 1px solid rgba(255, 255, 255, 0.07);
              box-shadow: 0 18px 36px rgba(0, 0, 0, 0.26);
            }

      - type: markdown
        title: Directions
        content: >
          {% set steps = state_attr('sensor.mealie_todays_recipe', 'recipeInstructions') or [] %}
          {% if steps %}
          {% for step in steps %}
          **Step {{ loop.index }}**

          {{ step.text if step.text is defined else step }}

          {% endfor %}
          {% else %}
          Directions are loading.
          {% endif %}
        card_mod:
          style: |
            ha-card {
              border-radius: 28px;
              padding: 8px 12px 12px;
              background: linear-gradient(145deg, rgba(28, 28, 30, 0.96), rgba(16, 16, 18, 0.98));
              border: 1px solid rgba(255, 255, 255, 0.07);
              box-shadow: 0 18px 36px rgba(0, 0, 0, 0.26);
            }
