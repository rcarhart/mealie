title: Kitchen
views:
  - title: Kitchen
    path: kitchen
    icon: mdi:chef-hat
    theme: Kitchen Dark
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: repeat(12, minmax(0, 1fr))
          grid-template-areas: |
            "header header header header header header header header header header header header"
            "hero hero hero hero hero hero hero hero kitchen kitchen kitchen kitchen"
            "weekly weekly weekly weekly weekly weekly kitchen kitchen kitchen kitchen kitchen kitchen"
            "env env env env env env notes notes notes notes notes notes"
          grid-gap: 20px
          margin: 0
          mediaquery:
            "(max-width: 1024px)":
              grid-template-columns: repeat(6, minmax(0, 1fr))
              grid-template-areas: |
                "header header header header header header"
                "hero hero hero hero hero hero"
                "kitchen kitchen kitchen kitchen kitchen kitchen"
                "weekly weekly weekly weekly weekly weekly"
                "env env env env env env"
                "notes notes notes notes notes notes"
        cards:
          - type: vertical-stack
            view_layout:
              grid-area: header
            cards:
              - type: custom:mushroom-template-card
                primary: Kitchen
                secondary: >-
                  {{ states('sensor.kitchen_today_label') }} - {{ states('sensor.kitchen_time') }}
                icon: mdi:chef-hat
                multiline_secondary: false
                fill_container: true
                card_mod:
                  style: |
                    ha-card {
                      background: linear-gradient(135deg, rgba(32, 32, 32, 0.92), rgba(18, 18, 18, 0.96));
                      border: 1px solid rgba(255,255,255,0.06);
                      border-radius: 24px;
                      padding: 8px 10px;
                      box-shadow: var(--ha-card-box-shadow);
                    }
              - type: custom:mushroom-chips-card
                alignment: start
                chips:
                  - type: template
                    icon: mdi:home-account
                    content: >-
                      {{ states('zone.home') }} home
                  - type: template
                    icon: mdi:cart-outline
                    content: >-
                      {{ states('sensor.kitchen_mealie_shopping_count') }} grocery items
                  # Replace these placeholders when you have real kitchen entities.
                  # - type: entity
                  #   entity: binary_sensor.kitchen_dishwasher_running
                  #   icon_color: blue
                  # - type: entity
                  #   entity: switch.kitchen_coffee_maker
                  # - type: entity
                  #   entity: light.kitchen_main
                card_mod:
                  style: |
                    ha-card {
                      background: transparent;
                      border: none;
                      padding-left: 4px;
                    }

          - type: custom:button-card
            view_layout:
              grid-area: hero
            entity: sensor.kitchen_mealie_tonights_meal
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: url
              url_path: '[[[ return entity?.attributes?.recipe_url || "https://recipes.rosscarhart.com"; ]]]'
            styles:
              card:
                - padding: 0
                - border-radius: 28px
                - overflow: hidden
                - box-shadow: var(--ha-card-box-shadow)
                - border: 1px solid rgba(255,255,255,0.07)
                - background: transparent
              custom_fields:
                hero:
                  - display: block
            custom_fields:
              hero: |
                [[[
                  const meal = entity?.state || 'Dinner loading';
                  const type = entity?.attributes?.meal_type || 'Tonight';
                  const category = entity?.attributes?.category || '';
                  const image = entity?.attributes?.image_url || '';
                  const accent = 'var(--kitchen-accent, #C86B3C)';
                  const meta = category ? `${type} - ${category}` : type;
                  return `
                    <div style="position:relative; min-height:460px; background:linear-gradient(180deg, rgba(11,11,11,0.05) 0%, rgba(11,11,11,0.25) 50%, rgba(11,11,11,0.78) 100%), url('${image}') center/cover no-repeat;">
                      <div style="position:absolute; inset:auto 18px 18px 18px; background:rgba(21,21,21,0.42); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,0.12); border-radius:24px; padding:20px 20px 18px; box-shadow:0 20px 45px rgba(0,0,0,0.25);">
                        <div style="font-size:0.78rem; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.70); margin-bottom:10px;">${meta}</div>
                        <div style="font-size:2.1rem; line-height:1.08; font-weight:700; color:#F6F1EB; margin-bottom:14px;">${meal}</div>
                        <div style="display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; background:${accent}; color:#111111; font-weight:700; font-size:0.92rem;">Open recipe</div>
                      </div>
                    </div>`;
                ]]]

          - type: markdown
            view_layout:
              grid-area: kitchen
            title: Kitchen
            content: >
              **Tonight's meal**

              {{ states('sensor.kitchen_mealie_tonights_meal') }}

              **Grocery items**

              {% set items = state_attr('sensor.mealie_shopping_items_raw', 'items') | default([], true) %}
              {% set ns = namespace(found=0) %}
              {% for item in items %}
                {% set checked = item.checked if item.checked is defined else false %}
                {% if not checked %}
                  {% set ns.found = ns.found + 1 %}
                  {{ item.display if item.display is defined and item.display else ((item.quantity | string if item.quantity is defined else '') ~ ' ' ~ (item.unit.name if item.unit is defined and item.unit else '') ~ ' ' ~ (item.food.name if item.food is defined and item.food else 'Item')) | trim }}

                {% endif %}
              {% endfor %}
              {% if ns.found == 0 %}
              All set.
              {% endif %}

              [Open full shopping list](https://recipes.rosscarhart.com/shopping-lists/426daca7-1a35-4b03-a802-d47b0458e184)
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(180deg, rgba(31,31,31,0.95), rgba(20,20,20,0.98));
                  border-radius: 24px;
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: var(--ha-card-box-shadow);
                  padding: 8px 10px 10px;
                }
                ha-card h1, ha-card h2 {
                  letter-spacing: 0.02em;
                }

          - type: markdown
            view_layout:
              grid-area: weekly
            title: Weekly Meal Plan
            content: >
              {% set meals = state_attr('sensor.mealie_household_mealplans', 'items') | default([], true) %}
              {% set week_start = now().date() - timedelta(days=now().weekday()) %}
              {% set week_end = week_start + timedelta(days=6) %}
              {% set ns = namespace(found=0) %}
              {% for item in meals %}
                {% set item_date = strptime(item.date, '%Y-%m-%d').date() if item.date is defined else none %}
                {% if item_date and week_start <= item_date <= week_end %}
                  {% set ns.found = ns.found + 1 %}
                  {% set recipe = item.recipe if item.recipe is defined else none %}
                  {% set recipe_name = recipe.name if recipe and recipe.name else (item.title if item.title else 'Meal planned') %}
                  {% set recipe_slug = recipe.slug if recipe and recipe.slug else '' %}
                  **{{ item_date.strftime('%A') }}**
                  {{ recipe_name }}
                  {% if recipe_slug %}
                  [Recipe](https://recipes.rosscarhart.com/g/home/r/{{ recipe_slug }}) | [Cook](https://recipes.rosscarhart.com/g/home/r/{{ recipe_slug }}/cook)
                  {% endif %}

                {% endif %}
              {% endfor %}
              {% if ns.found == 0 %}
              Weekly plan is loading from Mealie.
              {% endif %}
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(180deg, rgba(31,31,31,0.95), rgba(20,20,20,0.98));
                  border-radius: 24px;
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: var(--ha-card-box-shadow);
                  padding: 8px 10px 10px;
                }

          - type: horizontal-stack
            view_layout:
              grid-area: env
            cards:
              - type: custom:mushroom-template-card
                primary: Ambient Temperature
                secondary: >-
                  {{ states('sensor.kitchen_environment_temperature') }} F
                icon: mdi:thermometer
                fill_container: true
                card_mod:
                  style: |
                    ha-card {
                      background: linear-gradient(180deg, rgba(31,31,31,0.95), rgba(20,20,20,0.98));
                      border-radius: 22px;
                      border: 1px solid rgba(255,255,255,0.06);
                      box-shadow: var(--ha-card-box-shadow);
                    }
              - type: custom:mushroom-template-card
                primary: Humidity
                secondary: >-
                  {{ states('sensor.kitchen_environment_humidity') }} %
                icon: mdi:water-percent
                fill_container: true
                card_mod:
                  style: |
                    ha-card {
                      background: linear-gradient(180deg, rgba(31,31,31,0.95), rgba(20,20,20,0.98));
                      border-radius: 22px;
                      border: 1px solid rgba(255,255,255,0.06);
                      box-shadow: var(--ha-card-box-shadow);
                    }
              - type: custom:mushroom-template-card
                primary: Forecast
                secondary: >-
                  {{ state_attr('weather.forecast_home', 'temperature') }} F - {{ states('weather.forecast_home') }}
                icon: mdi:weather-partly-cloudy
                fill_container: true
                card_mod:
                  style: |
                    ha-card {
                      background: linear-gradient(180deg, rgba(31,31,31,0.95), rgba(20,20,20,0.98));
                      border-radius: 22px;
                      border: 1px solid rgba(255,255,255,0.06);
                      box-shadow: var(--ha-card-box-shadow);
                    }

          - type: markdown
            view_layout:
              grid-area: notes
            title: Install / Replace
            content: >
              **HACS cards used**

              Mushroom
              button-card
              card-mod
              layout-card

              **Replace these placeholders when available**

              Kitchen lights entity

              Dining lights entity

              Coffee maker entity

              Media player entity for speakers / YouTube Music
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(180deg, rgba(31,31,31,0.95), rgba(20,20,20,0.98));
                  border-radius: 24px;
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: var(--ha-card-box-shadow);
                  padding: 8px 10px 10px;
                }

