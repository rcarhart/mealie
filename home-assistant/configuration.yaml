homeassistant:
  name: Carhart Household
  unit_system: us_customary
  time_zone: America/New_York
  internal_url: http://192.168.86.47:8123

default_config:

frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resource_mode: yaml
  resources:
    - url: /local/community/lovelace-mushroom/mushroom.js
      type: module
    - url: /local/community/button-card/button-card.js
      type: module
    - url: /local/community/lovelace-card-mod/card-mod.js
      type: module
    - url: /local/community/lovelace-layout-card/layout-card.js
      type: module
    - url: /local/community/spotifyplus_card/spotifyplus_card.js
      type: module
    - url: /local/community/week-planner-card-plus/week-planner-card-plus.js
      type: module
  dashboards:
    kitchen-dashboard:
      mode: yaml
      title: Kitchen
      icon: mdi:chef-hat
      show_in_sidebar: true
      filename: dashboards/kitchen.yaml

template:
  - sensor:
      - name: kitchen_time
        state: "{{ now().strftime('%I:%M %p') }}"

      - name: house_status
        state: "Carhart Household"

rest:
  - resource: !secret mealie_mealplan_today_url
    method: GET
    headers:
      Authorization: !secret mealie_api_token
    scan_interval: 3600
    sensor:
      - name: mealie_todays_meal
        value_template: "{{ value_json[0]['recipe']['name'] if value_json and value_json | count > 0 else 'No meal planned' }}"
        unique_id: mealie_todays_meal

      - name: mealie_todays_meal_id
        value_template: "{{ value_json[0]['recipe']['id'] if value_json and value_json | count > 0 else '' }}"
        unique_id: mealie_todays_meal_id

      - name: mealie_todays_meal_slug
        value_template: "{{ value_json[0]['recipe']['slug'] if value_json and value_json | count > 0 else '' }}"
        unique_id: mealie_todays_meal_slug

  - resource: !secret mealie_mealplans_url
    method: GET
    headers:
      Authorization: !secret mealie_api_token
    scan_interval: 3600
    sensor:
      - name: mealie_weekly_plan
        value_template: "{{ value_json.total if value_json is mapping and 'total' in value_json else 0 }}"
        json_attributes:
          - items
        unique_id: mealie_weekly_plan

  - resource: !secret mealie_shopping_items_url
    method: GET
    headers:
      Authorization: !secret mealie_api_token
    scan_interval: 900
    sensor:
      - name: mealie_shopping_items
        value_template: "{{ value_json.total if value_json is mapping and 'total' in value_json else 0 }}"
        json_attributes:
          - items
        unique_id: mealie_shopping_items

  - resource_template: "http://192.168.86.47:9925/api/recipes/{{ states('sensor.mealie_todays_meal_id') }}"
    method: GET
    headers:
      Authorization: !secret mealie_api_token
    scan_interval: 900
    sensor:
      - name: mealie_todays_recipe
        value_template: "{{ value_json.name if value_json is mapping and 'name' in value_json else states('sensor.mealie_todays_meal') }}"
        json_attributes:
          - slug
          - description
          - recipeIngredient
          - recipeInstructions
          - totalTime
          - prepTime
          - performTime
          - recipeCategory
          - recipeYield
        unique_id: mealie_todays_recipe
