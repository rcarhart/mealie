homeassistant:
  name: Carhart Household
  unit_system: us_customary
  time_zone: America/New_York

default_config:

frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resource_mode: yaml
  dashboards:
    kitchen-dashboard:
      mode: yaml
      title: Kitchen
      icon: mdi:chef-hat
      show_in_sidebar: true
      filename: dashboards/kitchen.yaml

template:
  - sensor:
      - name: kitchen_time
        state: "{{ now().strftime('%I:%M %p') }}"

      - name: house_status
        state: "Carhart Household"

rest:
  - resource: "https://recipes.rosscarhart.com/api/households/mealplans/today"
    method: GET
    headers:
      Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJsb25nX3Rva2VuIjp0cnVlLCJpZCI6IjE4YTUwYWMxLWUwNDEtNDgyMi04Mzc3LWZlMWMxMWYyZjk1ZCIsIm5hbWUiOiJtZWFsaWUiLCJpbnRlZ3JhdGlvbl9pZCI6ImdlbmVyaWMiLCJleHAiOjE5MzA4MjE0NDd9.f4pkSLXzl8BUPAQ5BDG-GVgETn9jrSWLnl_xlzVKhdY
    scan_interval: 3600
    sensor:
      - name: mealie_todays_meal
        value_template: "{{ value_json[0]['recipe']['name'] }}"
        unique_id: mealie_todays_meal

      - name: mealie_todays_meal_id
        value_template: "{{ value_json[0]['recipe']['id'] }}"
        unique_id: mealie_todays_meal_id